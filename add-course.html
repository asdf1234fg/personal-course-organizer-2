<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Course</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <h1 class="logo">📚 CourseOrg</h1>

    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="courses.html">My Courses</a>
      <a href="add-course.html" class="active">Add Course</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>
</header>

<main>
  <section class="section">
    <div class="container">

      <h2>Add Course</h2>

      <form class="form">

        <label>Course Name</label>
        <input type="text" placeholder="Enter course name" required />

        <label>Instructor</label>
        <input type="text" placeholder="Enter instructor name" required />

        <label>Credit Hours</label>
        <select required>
          <option value="">Select</option>
          <option>1</option>
          <option>2</option>
          <option>3</option>
          <option>4</option>
        </select>

        <label>Notes</label>
        <textarea placeholder="Enter notes"></textarea>

        <button type="submit">Add Course</button>

      </form>

    </div>
  </section>
</main>

<footer class="footer">
  <p>© 2026 Personal Course Organizer</p>
</footer>

</body>
</html>
